name: Horrordex Static Synchronization Pipeline

on:
  schedule:
    - cron: "0 1,7,13,19 * * *"
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  bake-static-site:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Open Secure Workspace
        uses: actions/checkout@v4

      - name: Initialize Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Load Dependencies
        run: npm ci

      - name: Sync Static Content and Download Assets
        run: npm run sync:content

      - name: Generate Browser Icons
        run: npm run icons

      - name: Seed SEO Guide Matrix
        run: npm run seed:guides

      - name: Execute Build-Time Roblox Telemetry Sync
        run: npm run sync:roblox

      - name: Commit Scraped Static Data Back to Git
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): refresh static-dynamic matrix data [skip ci]"
          file_pattern: "src/content src/data/roblox-stats.json public/assets/img public/favicon-32x32.png public/apple-touch-icon.png public/icon-192x192.png public/icon-512x512.png"

      - name: Compile Optimized Static Production
        run: npm run build

      - name: Push Assets to Cloudflare Pages CDN Edge
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' && env.CLOUDFLARE_ACCOUNT_ID != '' }}
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          projectName: horrordex-xyz
          directory: ./dist
